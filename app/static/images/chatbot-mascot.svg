<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Assistant">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8A56"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <linearGradient id="cheek" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb4a8;stop-opacity:.9"/>
      <stop offset="100%" style="stop-color:#ff8a7a;stop-opacity:.55"/>
    </linearGradient>
  </defs>
  <!-- Face -->
  <circle cx="60" cy="60" r="52" fill="url(#bg)"/>
  <circle cx="60" cy="60" r="46" fill="#fff8f4" opacity=".25"/>
  <!-- Ears / antenna -->
  <ellipse cx="28" cy="38" rx="10" ry="12" fill="#e85d2c" opacity=".9"/>
  <ellipse cx="92" cy="38" rx="10" ry="12" fill="#e85d2c" opacity=".9"/>
  <line x1="60" y1="14" x2="60" y2="22" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
  <circle cx="60" cy="12" r="5" fill="#1a1a2e"/>
  <!-- Eyes -->
  <ellipse cx="44" cy="52" rx="9" ry="11" fill="#1a1a2e"/>
  <ellipse cx="76" cy="52" rx="9" ry="11" fill="#1a1a2e"/>
  <circle cx="46" cy="49" r="3" fill="#fff"/>
  <circle cx="78" cy="49" r="3" fill="#fff"/>
  <!-- Cheeks -->
  <ellipse cx="32" cy="64" rx="8" ry="5" fill="url(#cheek)"/>
  <ellipse cx="88" cy="64" rx="8" ry="5" fill="url(#cheek)"/>
  <!-- Smile -->
  <path d="M 40 72 Q 60 88 80 72" fill="none" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
</svg>
