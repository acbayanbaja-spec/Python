{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="mb-3">Student Registration</h3>
                <form method="POST">
                    <div class="mb-2"><input class="form-control" name="full_name" placeholder="Full name" required></div>
                    <div class="mb-2"><input class="form-control" type="email" name="email" placeholder="Email" required></div>
                    <div class="mb-2"><input class="form-control" name="student_number" placeholder="Student number" required></div>
                    <div class="mb-2">
                        <select class="form-select" name="year_level">
                            <option value="1">1st Year</option><option value="2">2nd Year</option><option value="3">3rd Year</option><option value="4">4th Year</option>
                        </select>
                    </div>
                    <div class="mb-3"><input class="form-control" type="password" name="password" placeholder="Password" required></div>
                    <button class="btn btn-primary w-100">Create Account</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
