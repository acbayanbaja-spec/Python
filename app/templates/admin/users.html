{% extends "base.html" %}
{% block content %}
<h3>Manage Users</h3>
<form method="POST" class="card p-3 mb-3">
    <div class="row g-2">
        <div class="col-md-3"><input class="form-control" name="full_name" placeholder="Full name" required></div>
        <div class="col-md-3"><input class="form-control" type="email" name="email" placeholder="Email" required></div>
        <div class="col-md-2"><select class="form-select" name="role"><option>student</option><option>registrar</option><option>accounting</option><option>admin</option><option>sao</option><option>department</option></select></div>
        <div class="col-md-2"><input class="form-control" name="student_number" placeholder="Student #"></div>
        <div class="col-md-1"><input class="form-control" type="number" name="year_level" value="1"></div>
        <div class="col-md-1"><button class="btn btn-primary w-100">Add</button></div>
    </div>
</form>
<table class="table table-sm table-bordered">
    <thead><tr><th>Name</th><th>Email</th><th>Role</th></tr></thead>
    <tbody>{% for u in users %}<tr><td>{{ u.full_name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td></tr>{% endfor %}</tbody>
</table>
{% endblock %}
