{% extends "base.html" %}
{% block content %}
<h3>Enrollment History</h3>
<table class="table table-bordered">
    <thead><tr><th>ID</th><th>Semester</th><th>School Year</th><th>Status</th><th>Remarks</th></tr></thead>
    <tbody>
    {% for row in enrollments %}
    <tr><td>{{ row.id }}</td><td>{{ row.semester }}</td><td>{{ row.school_year }}</td><td>{{ row.status }}</td><td>{{ row.rejection_reason or '-' }}</td></tr>
    {% else %}
    <tr><td colspan="5">No records yet.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
